<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment cancelled — eskp.in</title>
  <style>
    :root { --bg:#F9F6F0; --text:#2A2A2A; --text-muted:#7A6E68; --accent:#C4622D; --border:#E8E0D8; --max-width:680px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; line-height: 1.65; min-height: 100vh; }
    a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    .container { max-width: var(--max-width); margin: 0 auto; padding: 0 1.5rem; }
    nav { padding: 1.5rem 0; border-bottom: 1px solid var(--border); }
    nav .container { display: flex; align-items: center; justify-content: space-between; }
    .wordmark { font-family: Georgia, 'Times New Roman', serif; font-size: 1.2rem; font-weight: normal; color: var(--text); text-decoration: none; letter-spacing: -0.02em; }
    .wordmark span { color: var(--accent); }
    .content { padding: 5rem 0; text-align: center; }
    h1 { font-family: Georgia, 'Times New Roman', serif; font-size: 1.75rem; font-weight: normal; letter-spacing: -0.02em; margin-bottom: 1rem; }
    p { color: var(--text-muted); font-size: 0.95rem; max-width: 440px; margin: 0 auto 1rem; }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a class="wordmark" href="/">eskp<span>.</span>in</a>
    </div>
  </nav>
  <main>
    <div class="container">
      <div class="content">
        <h1>Payment cancelled.</h1>
        <p>No charge was made. The payment link in your email is still valid if you'd like to proceed.</p>
        <p>If you have questions, reply to the original email or <a href="mailto:hello@mail.eskp.in">contact us</a>.</p>
      </div>
    </div>
  </main>
</body>
</html>
