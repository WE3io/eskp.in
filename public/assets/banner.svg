<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <!-- Background -->
  <rect width="1500" height="500" fill="#F9F6F0"/>

  <!-- Subtle grid of dots — texture -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.5" fill="#E8E0D8"/>
  </pattern>
  <rect width="1500" height="500" fill="url(#dots)"/>

  <!-- Connection motif — larger, positioned left -->
  <circle cx="340" cy="250" r="36" fill="#C4622D" opacity="0.12"/>
  <circle cx="540" cy="250" r="36" fill="#C4622D" opacity="0.12"/>
  <line x1="376" y1="250" x2="504" y2="250" stroke="#C4622D" stroke-width="2.5" opacity="0.35"/>
  <circle cx="340" cy="250" r="18" fill="#C4622D" opacity="0.9"/>
  <circle cx="540" cy="250" r="18" fill="#C4622D" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="700" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="normal"
        fill="#2A2A2A" text-anchor="middle" letter-spacing="-2">eskp.in</text>

  <!-- Tagline -->
  <text x="700" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="normal"
        fill="#7A6E68" text-anchor="middle" letter-spacing="0">Help that's human.</text>
</svg>
