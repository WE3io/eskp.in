        stroke-linecap="round" opacity="0.9"/>
  <!-- Arrow breaking out top-right -->
  <line x1="420" y1="166" x2="470" y2="142" stroke="#C4622D" stroke-width="14" stroke-linecap="round"/>
  <line x1="452" y1="134" x2="470" y2="142" stroke="#C4622D" stroke-width="14" stroke-linecap="round"/>
  <line x1="470" y1="142" x2="463" y2="162" stroke="#C4622D" stroke-width="14" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="840" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="normal"
