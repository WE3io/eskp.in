<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Panel dashboard — eskp.in">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Your Advisory Threads — eskp.in</title>
  <style>
    :root {
      --bg:           #F9F6F0;
      --bg-card:      #FFFFFF;
      --text:         #2C2420;
      --text-muted:   #7A6E68;
      --accent:       #C4622D;
      --accent-light: #F7EDE6;
      --border:       #E8E0D8;
      --max-width:    680px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.65;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    a:hover { opacity: 0.8; }

    .container { max-width: var(--max-width); margin: 0 auto; padding: 0 1.5rem; }

    nav {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    nav .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .wordmark {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.2rem;
      font-weight: normal;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .wordmark span { color: var(--accent); }
    .nav-links { display: flex; gap: 1.25rem; align-items: center; }
    .nav-link { font-size: 0.875rem; color: var(--text-muted); text-decoration: none; }
    .nav-link:hover { color: var(--text); opacity: 1; }

    .prose {
      padding: 2.5rem 0 4rem;
    }
    .prose h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    .thread-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
      text-decoration: none;
      display: block;
      transition: border-color 0.15s;
    }
    .thread-card:hover {
      border-color: var(--accent);
      opacity: 1;
    }
    .thread-card .summary {
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    .thread-card .meta {
      font-size: 0.825rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge-invited    { background: var(--accent-light); color: var(--accent); }
    .badge-accepted   { background: #E6F2E6; color: #2D6A2D; }
    .badge-declined   { background: #F2E6E6; color: #8B3A3A; }
    .badge-expired    { background: #EDEDED; color: #777; }

    .empty-state, .error-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .error-state { color: var(--accent); }

    .loading {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      font-size: 0.825rem;
      color: var(--text-muted);
    }
    footer .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    footer a { color: var(--text-muted); }

    @media (max-width: 480px) {
      .prose h1 { font-size: 1.6rem; }
      footer .container { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a class="wordmark" href="/">eskp<span>.</span>in</a>
      <div class="nav-links">
        <a class="nav-link" href="/support.html">Support</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="prose">
        <h1>Your advisory threads</h1>
        <div id="thread-list">
          <div class="loading">Loading threads&hellip;</div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <span>eskp.in — a small platform for real help</span>
      <span>
        <a href="/support.html">Support</a>
        &nbsp;&middot;&nbsp;
        <a href="/privacy.html">Privacy</a>
        &nbsp;&middot;&nbsp;
        <a href="/terms.html">Terms</a>
      </span>
    </div>
  </footer>

  <script>
    (function () {
      var container = document.getElementById('thread-list');

      function badgeClass(status) {
        switch ((status || '').toLowerCase()) {
          case 'accepted': return 'badge-accepted';
          case 'declined': return 'badge-declined';
          case 'expired':  return 'badge-expired';
          default:         return 'badge-invited';
        }
      }

      function formatDate(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      }

      function escHtml(str) {
        var div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
      }

      function render(threads) {
        if (!threads || threads.length === 0) {
          container.innerHTML = '<div class="empty-state">No active advisory threads.</div>';
          return;
        }
        container.innerHTML = threads.map(function (t) {
          return '<a class="thread-card" href="/panel/thread?m=' + encodeURIComponent(t.panelMemberId) + '">'
            + '<div class="summary">' + escHtml(t.goalSummary) + '</div>'
            + '<div class="meta">'
            + '<span>' + escHtml(t.roleLabel) + '</span>'
            + '<span class="badge ' + badgeClass(t.status) + '">' + escHtml(t.status) + '</span>'
            + (t.lastActivity ? '<span>' + formatDate(t.lastActivity) + '</span>' : '')
            + '</div>'
            + '</a>';
        }).join('');
      }

      fetch('/panel/api/dashboard', { credentials: 'same-origin' })
        .then(function (res) {
          if (res.status === 401 || res.status === 403) {
            window.location.href = '/panel/login';
            return;
          }
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function (data) {
          if (data) render(data);
        })
        .catch(function () {
          container.innerHTML = '<div class="error-state">Could not load threads. Please try again.</div>';
        });
    })();
  </script>

</body>
</html>
