# Rate limiting zones
limit_req_zone $http_cf_connecting_ip zone=global:10m rate=60r/m;
limit_req_zone $http_cf_connecting_ip zone=goals_post:10m rate=1r/m;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name eskp.in www.eskp.in;
    return 301 https://$host$request_uri;
}

# HTTPS origin (Cloudflare Full SSL — self-signed cert is fine)
server {
    listen 443 ssl;
    server_name eskp.in www.eskp.in;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 1m;
    real_ip_header CF-Connecting-IP;

    # Static files — served directly by nginx, no Node hit
    root /usr/share/nginx/html;
    index index.html;

    limit_req zone=global burst=20 nodelay;
    limit_req_status 429;

    # Health check
    location /health {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        access_log off;
    }

    # Goal submission — tighter rate limit at edge
    location = /goals {
        limit_req zone=goals_post burst=3 nodelay;
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # API routes — proxied to Node app
    location ~ ^/(goals|webhooks)(/|$) {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Static files for everything else
    location / {
        try_files $uri $uri/ $uri.html =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
    }
}
