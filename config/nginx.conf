# Rate limiting zones — defined at http level via include
limit_req_zone $http_cf_connecting_ip zone=global:10m rate=60r/m;
limit_req_zone $http_cf_connecting_ip zone=goals_post:10m rate=5r/h;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name eskp.in www.eskp.in;
    return 301 https://$host$request_uri;
}

# HTTPS origin (Cloudflare Full SSL — self-signed cert is fine)
server {
    listen 443 ssl;
    server_name eskp.in www.eskp.in;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Request body size limit
    client_max_body_size 1m;

    # Trust Cloudflare's forwarded IP
    real_ip_header CF-Connecting-IP;

    # Apply global rate limit to all routes
    limit_req zone=global burst=20 nodelay;
    limit_req_status 429;

    # Health check — exempt from rate limiting
    location /health {
        limit_req off;
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        access_log off;
    }

    # Goal submission — tighter rate limit
    location = /goals {
        limit_req zone=goals_post burst=3 nodelay;
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }
}
