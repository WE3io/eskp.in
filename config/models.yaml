# Model registry — all available LLM providers and models.
# Each entry defines a model the orchestration layer can dispatch to.

version: 1

# Global OpenRouter provider preferences (merged with per-model settings)
openrouter:
  api_key_env: OPENROUTER_API_KEY
  base_url: "https://openrouter.ai/api/v1"
  app_url: "https://eskp.in"
  app_name: "eskp.in"
  request_timeout_ms: 30000
  global_provider:
    data_collection: "deny"
    require_parameters: true
    allow_fallbacks: true

models:
  # --- Cloud via OpenRouter (primary) ---
  haiku-openrouter:
    type: openrouter
    model: "anthropic/claude-haiku-4.5"
    capabilities: [text, json_output]
    cost_tier: economy
    intelligence_tier: medium
    speed_class: fast
    constraints:
      context_window: 200000
      max_output_tokens: 8192
    cost:
      input_per_mtok: 0.80
      output_per_mtok: 4.00
    provider:
      sort: "price"

  sonnet-openrouter:
    type: openrouter
    model: "anthropic/claude-sonnet-4-6"
    capabilities: [text, json_output, tool_use, code_generation]
    cost_tier: standard
    intelligence_tier: high
    speed_class: standard
    constraints:
      context_window: 200000
      max_output_tokens: 8192
    cost:
      input_per_mtok: 3.00
      output_per_mtok: 15.00
    provider:
      sort: "price"

  # --- Tier 2: Mid-tier coding models via OpenRouter ---
  deepseek-v3:
    type: openrouter
    model: "deepseek/deepseek-v3.2"
    capabilities: [text, json_output, code_generation, tool_use, reasoning]
    cost_tier: economy
    intelligence_tier: high
    speed_class: fast
    constraints:
      context_window: 163840
      max_output_tokens: 8192
    cost:
      input_per_mtok: 0.26
      output_per_mtok: 0.38
    provider:
      sort: "price"
      data_collection: "deny"

  qwen-coder:
    type: openrouter
    model: "qwen/qwen3-coder"
    capabilities: [text, json_output, code_generation, tool_use]
    cost_tier: economy
    intelligence_tier: high
    speed_class: fast
    constraints:
      context_window: 262144
      max_output_tokens: 8192
    cost:
      input_per_mtok: 0.22
      output_per_mtok: 1.00
    provider:
      sort: "price"
      data_collection: "deny"

  # --- Cloud via Anthropic SDK (fallback) ---
  haiku-anthropic:
    type: anthropic
    model: "claude-haiku-4-5-20251001"
    capabilities: [text, json_output]
    cost_tier: economy
    intelligence_tier: medium
    speed_class: fast
    constraints:
      context_window: 200000
      max_output_tokens: 8192
    cost:
      input_per_mtok: 0.80
      output_per_mtok: 4.00

  # --- Local via Ollama (zero cost, budget-exhaustion fallback) ---
  # Qwen 2.5 1.5B Q4_K_M — ~1.0 GB in memory, adequate for classification/decomposition.
  # Runs on host via Ollama systemd service; reached from Docker via host.docker.internal.
  local-best:
    type: local
    adapter: ollama
    endpoint: "http://host.docker.internal:11434"
    model_name: "qwen2.5:1.5b"
    capabilities: [text, json_output]
    cost_tier: free
    intelligence_tier: low
    speed_class: slow
    constraints:
      context_window: 32768
      max_output_tokens: 2048
      max_concurrent: 1
    cost:
      input_per_mtok: 0
      output_per_mtok: 0
